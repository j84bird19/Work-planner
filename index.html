<!doctype html>
<html>
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bird Work Planner</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#050505">
<style>
body{margin:0;background:#050505;color:#fff;font-family:Arial,sans-serif;padding:10px}button{background:#222;color:#fff;border:0;border-radius:10px;padding:10px;font-weight:bold}button.on,.green{background:#00d084;color:#001b10}.blue{background:#0099ff}.red{background:#ef4444}input,select,textarea{width:100%;box-sizing:border-box;padding:8px;border-radius:8px;border:1px solid #444;background:#222;color:#fff}textarea{min-height:55px}label{display:block;color:#aaa;font-size:11px;text-transform:uppercase;margin-top:8px}.card{background:#111;border:1px solid #333;border-radius:14px;padding:10px;margin:8px 0}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.top{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}.tabs{display:flex;gap:6px;flex-wrap:wrap}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{background:#111;border:1px solid #333;border-radius:12px;padding:8px}.stat b{color:#00d084;font-size:20px}.grid{display:grid;grid-template-columns:1fr 350px;gap:8px}.days,.month{display:grid;grid-template-columns:repeat(7,1fr)}.dn{font-size:11px;color:#aaa;padding:5px}.day{min-height:72px;background:#080808;border:1px solid #222;padding:4px;overflow:hidden}.sel{background:#2a2a2a}.today{outline:2px solid #0099ff}.ev{font-size:11px;background:#8b5cf6;border-radius:4px;margin:2px 0;padding:2px}.done{background:#00d084;color:#001b10}.paper{background:#fff;color:#111;border-radius:12px;padding:14px}.paper h2,.paper h3{color:#111}.line{display:grid;grid-template-columns:1fr 90px;border-bottom:1px solid #ddd;padding:5px 0}.item{background:#1b1b1b;border:1px solid #333;border-radius:10px;padding:8px;margin:6px 0}.itemHead{display:grid;grid-template-columns:25px 1fr;gap:6px}.priceGrid{display:grid;grid-template-columns:1fr 100px 80px 80px 90px;gap:5px;margin-top:6px}.supplyGrid,.laborGrid{display:grid;grid-template-columns:25px 1fr 1fr 90px;gap:5px;align-items:center;background:#1b1b1b;border:1px solid #333;border-radius:10px;padding:8px;margin:6px 0}.mini{color:#00d084;text-align:right;font-size:12px}.sig{width:100%;height:130px;background:#fff;border-radius:10px;touch-action:none}.invoiceCard{padding:8px;border-radius:8px;margin:5px 0;color:#111}.paid{background:#dcfce7}.unpaid{background:#fee2e2}.small{color:#aaa;font-size:12px}@media(max-width:900px){.grid{grid-template-columns:1fr}.priceGrid{grid-template-columns:1fr 1fr}.supplyGrid,.laborGrid{grid-template-columns:25px 1fr}.supplyGrid input,.laborGrid input{grid-column:2}}
</style>
</head>
<body>
<div class="top"><h1>Work Planner</h1><div class="tabs"><button id="bPlan" class="on" onclick="tab('planner')">Planner</button><button id="bInv" onclick="tab('invoice')">Invoices</button><button onclick="exportCSV()">Export</button></div></div>
<div id="planner">
<div class="stats"><div class="stat">Hours<br><b id="stH">0</b></div><div class="stat">Paid<br><b id="stP">$0</b></div><div class="stat">Owed<br><b id="stO">$0</b></div></div>
<div class="grid">
<div class="card"><div class="top"><button onclick="month(-1)">‹</button><h2 id="calTitle"></h2><button onclick="month(1)">›</button></div><div id="cal"></div></div>
<div class="card">
<h2>DAY</h2><div id="dayTitle"></div><div id="dayList"></div>
<input type="hidden" id="jid"><label>Date</label><input id="jdate" type="date"><label>Work</label><input id="jdesc">
<div class="row"><div><label>Status</label><select id="jstatus"><option value="scheduled">Scheduled</option><option value="completed">Completed</option></select></div><div><label>Paid?</label><select id="jpaid"><option value="no">No</option><option value="yes">Yes</option></select></div></div>
<div class="row3"><div><label>In</label><input id="jin" type="time" oninput="calcJob()"></div><div><label>Out</label><input id="jout" type="time" oninput="calcJob()"></div><div><label>Hours</label><input id="jhours" type="number" step="0.25"></div></div>
<div class="row3"><div><label>Rate</label><input id="jrate" type="number" step="0.01" value="20" oninput="calcJob()"></div><div><label>Owed</label><input id="jowed" type="number" step="0.01"></div><div><label>Received</label><input id="jrec" type="number" step="0.01"></div></div>
<label>Client</label><input id="jclient" list="clients" oninput="clientInvoices()"><datalist id="clients"></datalist><label>Address</label><input id="jaddr"><label>Phone</label><input id="jphone">
<div class="card"><h3>Client Duties / Invoices</h3><button class="blue" onclick="invoiceForClient()">+ Invoice for This Client</button><div id="clientInv"></div></div>
<label>Notes</label><textarea id="jnotes"></textarea><div class="row3"><button class="green" onclick="saveJob()">Save</button><button onclick="clearJob()">Clear</button><button class="red" onclick="delJob()">Delete</button></div>
</div></div><div class="card"><h3>Jobs</h3><div id="jobs"></div></div></div>
<div id="invoice" style="display:none">
<div class="top"><h2>Invoices</h2><button class="blue" onclick="newInv()">+ New Invoice</button></div>
<div class="grid"><div class="card">
<input type="hidden" id="iid"><label>Client</label><input id="ic" list="clients"><label>Address</label><input id="ia"><label>Phone</label><input id="ip"><label>Date</label><input id="idate" type="date">
<h3>SERVICES</h3><div id="svc"></div><div class="row"><input id="newSvc" placeholder="Add service"><button onclick="addSvc()">Add</button></div>
<h3>SUPPLIES</h3><div id="sup"></div><div class="row"><input id="newSup" placeholder="Add supply"><button onclick="addSup()">Add</button></div>
<h3>LABOR</h3><div id="lab"></div><div class="row"><input id="newLab" placeholder="Add labor field"><button onclick="addLab()">Add</button></div>
<div class="stats"><div class="stat">Total<br><b id="it">$0</b></div><div class="stat">Paid<br><b id="ipaid">$0</b></div><div class="stat">Balance<br><b id="ibal">$0</b></div></div>
<div class="row3"><div><label>Status</label><select id="istat"><option value="unpaid">Unpaid</option><option value="paid">Paid</option></select></div><div><label>How Paid</label><select id="ihow"><option></option><option>Cash</option><option>Check</option><option>Cash App</option><option>PayPal</option><option>Venmo</option><option>Transfer</option><option>Other</option></select></div><div><label>Amount Paid</label><input id="iamt" type="number" step="0.01" oninput="calcInv()"></div></div>
<label>Notes</label><textarea id="inotes"></textarea><h3>Signature</h3><canvas id="sig" class="sig"></canvas><div class="row3"><button onclick="clearSig()">Clear</button><button class="green" onclick="saveInv()">Save Invoice</button><button class="red" onclick="delInv()">Delete</button></div>
</div><div class="card"><h3>Preview</h3><div id="prev" class="paper"></div></div></div><div class="card"><h3>All Invoices</h3><div id="allInv"></div></div></div>
<script>
const KEY='bird_planner_clean_v1';let db=JSON.parse(localStorage.getItem(KEY)||'null')||{jobs:[],invoices:[],services:['Weed Eating','Mowing','Trimming','Leaf Blowing','Gutters','Debris Removal','Landscaping','Painting','Repair','Organizing','Moving','Hauling'],supplies:['Gas','String','Oil'],labor:['Lot Size','Time']};let cur=new Date(),sel=iso(new Date()),AS=[],AU=[],AL=[],ctx,can,draw=false;
function save(){localStorage.setItem(KEY,JSON.stringify(db))}function id(){return crypto.randomUUID?crypto.randomUUID():'id'+Date.now()+Math.random()}function iso(d){let x=new Date(d);x.setMinutes(x.getMinutes()-x.getTimezoneOffset());return x.toISOString().slice(0,10)}function cash(n){return '$'+Number(n||0).toFixed(2)}function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function svcAmt(s){return s.type==='hourly'?Number(s.hours||0)*Number(s.rate||0):Number(s.amount||0)}function invTotals(){let st=AS.reduce((a,s)=>a+svcAmt(s),0),su=AU.reduce((a,s)=>a+Number(s.cost||0),0),raw=AL.reduce((a,l)=>a+Number(l.price||0),0),hour=AS.some(s=>s.type==='hourly'),lab=hour?0:raw;return{st,su,raw,lab,hour,total:st+su+lab}}
function tab(t){planner.style.display=t==='planner'?'block':'none';invoice.style.display=t==='invoice'?'block':'none';bPlan.className=t==='planner'?'on':'';bInv.className=t==='invoice'?'on':'';if(t==='invoice'){renderInv();allInvoices();setupSig();if(!idate.value)newInv()}}
function render(){stats();calendar();dayPanel();jobList();clientList();clientInvoices()}function stats(){let h=0,p=0,o=0;db.jobs.forEach(j=>{if(j.status==='completed'){h+=Number(j.hours||0);p+=Number(j.rec||0);o+=Math.max(Number(j.owed||0)-Number(j.rec||0),0)}});stH.textContent=h.toFixed(2);stP.textContent=cash(p);stO.textContent=cash(o)}
function calendar(){calTitle.textContent=cur.toLocaleDateString(undefined,{month:'long',year:'numeric'});let y=cur.getFullYear(),m=cur.getMonth(),start=new Date(y,m,1,12);start.setDate(1-start.getDay());let names=['SUN','MON','TUE','WED','THU','FRI','SAT'];let h='<div class=days>'+names.map(n=>`<div class=dn>${n}</div>`).join('')+'</div><div class=month>';for(let i=0;i<42;i++){let d=new Date(start);d.setDate(start.getDate()+i);let day=iso(d),js=db.jobs.filter(j=>j.date===day);h+=`<div class="day ${d.getMonth()!==m?'outside':''} ${day===sel?'sel':''} ${day===iso(new Date())?'today':''}" onclick="pick('${day}')"><small>${d.getDate()}</small>${js.slice(0,3).map(j=>`<div class="ev ${j.status==='completed'?'done':''}" onclick="event.stopPropagation();loadJob('${j.id}')">${esc(j.desc)} ${j.status==='completed'?(j.hours||0)+'h':(j.in||'')}</div>`).join('')}</div>`}cal.innerHTML=h+'</div>'}
function month(n){cur.setMonth(cur.getMonth()+n);calendar()}function pick(d){sel=d;clearJob(d);let j=db.jobs.find(x=>x.date===d);if(j)loadJob(j.id);render()}
function dayPanel(){dayTitle.textContent=new Date(sel+'T12:00').toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'});let js=db.jobs.filter(j=>j.date===sel);dayList.innerHTML=js.length?js.map(j=>`<div class=card onclick="loadJob('${j.id}')">${esc(j.desc)}<br><small>${j.status} • ${j.hours||0}h • ${cash(j.owed)}</small></div>`).join(''):'<p class=small>No jobs.</p>'}
function calcHours(a,b){if(!a||!b)return'';let[ah,am]=a.split(':').map(Number),[bh,bm]=b.split(':').map(Number),mins=bh*60+bm-ah*60-am;if(mins<0)mins+=1440;return(mins/60).toFixed(mins%60?2:0)}function calcJob(){let h=calcHours(jin.value,jout.value);if(h)jhours.value=h;if(jhours.value&&jrate.value)jowed.value=(Number(jhours.value)*Number(jrate.value)).toFixed(2)}
function clearJob(d=sel){jid.value='';jdate.value=d;jdesc.value='';jstatus.value='scheduled';jpaid.value='no';jin.value='';jout.value='';jhours.value='';jowed.value='';jrec.value='';jclient.value='';jaddr.value='';jphone.value='';jnotes.value='';clientInvoices()}
function saveJob(){calcJob();let j={id:jid.value||id(),date:jdate.value||sel,desc:jdesc.value,status:jstatus.value,paid:jpaid.value,in:jin.value,out:jout.value,hours:jhours.value,rate:jrate.value,owed:jowed.value,rec:jrec.value,client:jclient.value,addr:jaddr.value,phone:jphone.value,notes:jnotes.value};let i=db.jobs.findIndex(x=>x.id===j.id);i>=0?db.jobs[i]=j:db.jobs.push(j);sel=j.date;jid.value=j.id;save();render()}
function loadJob(x){let j=db.jobs.find(a=>a.id===x);if(!j)return;sel=j.date;jid.value=j.id;jdate.value=j.date;jdesc.value=j.desc;jstatus.value=j.status;jpaid.value=j.paid;jin.value=j.in;jout.value=j.out;jhours.value=j.hours;jrate.value=j.rate||20;jowed.value=j.owed;jrec.value=j.rec;jclient.value=j.client;jaddr.value=j.addr;jphone.value=j.phone;jnotes.value=j.notes;render()}
function delJob(){if(!jid.value)return;db.jobs=db.jobs.filter(j=>j.id!==jid.value);save();clearJob();render()}function jobList(){jobs.innerHTML=db.jobs.map(j=>`<div>${esc(j.date)} • ${esc(j.desc)} • ${j.status} • ${j.hours||0}h • ${cash(j.owed)} • ${esc(j.client)}</div>`).join('')||'<p class=small>No jobs yet.</p>'}
function clientList(){let n=new Set();db.jobs.forEach(j=>j.client&&n.add(j.client));db.invoices.forEach(i=>i.client&&n.add(i.client));let opts=[...n].map(x=>`<option value="${esc(x)}"></option>`).join('');clients.innerHTML=opts;invoiceClientList.innerHTML=opts}
function clientInvoices(){let arr=db.invoices.filter(i=>i.client===jclient.value.trim());clientInv.innerHTML=arr.length?arr.map(i=>`<div class="clientInvoiceCard ${i.status}" onclick="tab('invoice');loadInv('${i.id}')">${i.date} • ${cash(i.total)} • ${i.status}</div>`).join(''):'<p class=small>No invoices.</p>'}function invoiceForClient(){tab('invoice');newInv();ic.value=jclient.value;ia.value=jaddr.value;ip.value=jphone.value;preview()}
function addSvc(){let n=newSvc.value.trim();if(n&&!db.services.includes(n))db.services.push(n);newSvc.value='';save();renderInv()}function addSup(){let n=newSup.value.trim();if(n&&!db.supplies.includes(n))db.supplies.push(n);newSup.value='';save();renderInv()}function addLab(){let n=newLab.value.trim();if(n&&!db.labor.includes(n))db.labor.push(n);newLab.value='';save();renderInv()}function foc(arr,n,obj){let x=arr.find(a=>a.name===n);if(!x){x={name:n,...obj};arr.push(x)}return x}function rem(arr,n){let i=arr.findIndex(a=>a.name===n);if(i>=0)arr.splice(i,1)}function sq(s){return String(s).replaceAll("\\","\\\\").replaceAll("'","\\'")}
function renderInv(){renderSvc();renderSup();renderLab();calcInv()}function renderSvc(){svc.innerHTML=db.services.map(n=>{let x=AS.find(a=>a.name===n)||{},on=AS.some(a=>a.name===n),type=x.type||'flat';return`<div class=item><div class=itemHead><input type=checkbox ${on?'checked':''} onchange="this.checked?foc(AS,'${sq(n)}',{type:'flat'}):rem(AS,'${sq(n)}');renderInv()"><b>${esc(n)}</b></div><div class=priceGrid><input placeholder="lot/details" value="${esc(x.details||'')}" oninput="foc(AS,'${sq(n)}',{type:'flat'}).details=this.value;preview()"><select onchange="foc(AS,'${sq(n)}',{type:'flat'}).type=this.value;renderInv()"><option value=flat ${type==='flat'?'selected':''}>Flat</option><option value=job ${type==='job'?'selected':''}>Per Job</option><option value=hourly ${type==='hourly'?'selected':''}>Hourly</option></select><input type=number step=.25 placeholder=hrs ${type==='hourly'?'':'disabled'} value="${esc(x.hours||'')}" oninput="foc(AS,'${sq(n)}',{type:'hourly'}).hours=this.value;calcInv()"><input type=number step=.01 placeholder=rate ${type==='hourly'?'':'disabled'} value="${esc(x.rate||'')}" oninput="foc(AS,'${sq(n)}',{type:'hourly'}).rate=this.value;calcInv()"><input type=number step=.01 placeholder=amount ${type==='hourly'?'readonly':''} value="${type==='hourly'?svcAmt(x).toFixed(2):esc(x.amount||'')}" oninput="foc(AS,'${sq(n)}',{type:'flat'}).amount=this.value;calcInv()"></div></div>`}).join('')+`<div class=mini>Services: ${cash(AS.reduce((a,s)=>a+svcAmt(s),0))}</div>`}
function renderSup(){sup.innerHTML=db.supplies.map(n=>{let x=AU.find(a=>a.name===n)||{},on=AU.some(a=>a.name===n);return`<div class=supplyGrid><input type=checkbox ${on?'checked':''} onchange="this.checked?foc(AU,'${sq(n)}',{}):rem(AU,'${sq(n)}');renderInv()"><b>${esc(n)}</b><input placeholder=used value="${esc(x.used||'')}" oninput="foc(AU,'${sq(n)}',{}).used=this.value;preview()"><input type=number step=.01 placeholder=cost value="${esc(x.cost||'')}" oninput="foc(AU,'${sq(n)}',{}).cost=this.value;calcInv()"></div>`}).join('')+`<div class=mini>Supplies: ${cash(AU.reduce((a,s)=>a+Number(s.cost||0),0))}</div>`}
function renderLab(){lab.innerHTML=db.labor.map(n=>{let x=AL.find(a=>a.name===n)||{},on=AL.some(a=>a.name===n);return`<div class=laborGrid><input type=checkbox ${on?'checked':''} onchange="this.checked?foc(AL,'${sq(n)}',{}):rem(AL,'${sq(n)}');renderInv()"><b>${esc(n)}</b><input placeholder=value value="${esc(x.value||'')}" oninput="foc(AL,'${sq(n)}',{}).value=this.value;preview()"><input type=number step=.01 placeholder=labor value="${esc(x.price||'')}" oninput="foc(AL,'${sq(n)}',{}).price=this.value;calcInv()"></div>`}).join('')+`<div class=mini>Labor: ${cash(AL.reduce((a,l)=>a+Number(l.price||0),0))}</div>`}
function calcInv(){let t=invTotals(),paid=Number(iamt.value||0);it.textContent=cash(t.total);ipaid.textContent=cash(paid);ibal.textContent=cash(Math.max(t.total-paid,0));if(paid>=t.total&&t.total>0)istat.value='paid';preview()}function newInv(){iid.value='';ic.value='';ia.value='';ip.value='';idate.value=iso(new Date());istat.value='unpaid';ihow.value='';iamt.value='';inotes.value='';AS=[];AU=[];AL=[];renderInv();clearSig(false)}
function invObj(){let t=invTotals(),paid=Number(iamt.value||0);return{id:iid.value||id(),client:ic.value,addr:ia.value,phone:ip.value,date:idate.value,status:istat.value,how:ihow.value,paid,amountPaid:paid,balance:Math.max(t.total-paid,0),total:t.total,hasHourly:t.hour,services:structuredClone(AS),supplies:structuredClone(AU),labor:structuredClone(AL),notes:inotes.value,signature:can?can.toDataURL('image/png'):''}}
function saveInv(){let inv=invObj(),i=db.invoices.findIndex(x=>x.id===inv.id);i>=0?db.invoices[i]=inv:db.invoices.push(inv);iid.value=inv.id;save();allInvoices();clientInvoices();preview();alert('Invoice saved')}function loadInv(x){let inv=db.invoices.find(i=>i.id===x);if(!inv)return;iid.value=inv.id;ic.value=inv.client;ia.value=inv.addr;ip.value=inv.phone;idate.value=inv.date;istat.value=inv.status;ihow.value=inv.how;iamt.value=inv.amountPaid;inotes.value=inv.notes;AS=structuredClone(inv.services||[]);AU=structuredClone(inv.supplies||[]);AL=structuredClone(inv.labor||[]);renderInv();setupSig();clearSig(false);if(inv.signature){let im=new Image();im.onload=()=>ctx.drawImage(im,0,0,can.width,can.height);im.src=inv.signature}}
function delInv(){if(!iid.value)return;db.invoices=db.invoices.filter(i=>i.id!==iid.value);save();newInv();allInvoices();clientInvoices()}function preview(){let inv=invObj();let sr=inv.services.map(s=>`<div class=line><div><b>${esc(s.name)}</b><br><small>${esc(s.details||'')} ${s.type==='hourly'?`— ${s.hours||0} hrs × ${cash(s.rate||0)}/hr`:s.type==='job'?'— per job':'— flat'}</small></div><div>${cash(svcAmt(s))}</div></div>`).join(''),ur=inv.supplies.map(s=>`<div class=line><div><b>${esc(s.name)}</b><br><small>Used: ${esc(s.used||'')}</small></div><div>${cash(s.cost)}</div></div>`).join(''),lr=inv.labor.map(l=>`<div class=line><div><b>${esc(l.name)}</b><br><small>${esc(l.value||'')}${inv.hasHourly?' — tracked only':''}</small></div><div>${inv.hasHourly?'Included':cash(l.price)}</div></div>`).join('');prev.innerHTML=`<h2>Invoice / Receipt</h2><p><b>Date:</b> ${esc(inv.date)}<br><b>Client:</b> ${esc(inv.client)}<br><b>Phone:</b> ${esc(inv.phone)}<br><b>Address:</b> ${esc(inv.addr)}</p>${sr?'<h3>Services</h3>'+sr:''}${ur?'<h3>Supplies</h3>'+ur:''}${lr?'<h3>Labor</h3>'+lr:''}${inv.hasHourly?'<p><small><b>Note:</b> Labor is tracked only because hourly pricing already includes labor.</small></p>':''}<h3>Total Due: ${cash(inv.total)}</h3><p><b>Paid:</b> ${cash(inv.paid)} ${inv.how?`by ${esc(inv.how)}`:''}<br><b>Still Owed:</b> ${cash(inv.balance)}<br><b>Status:</b> ${esc(inv.status)}</p>${inv.notes?`<p>${esc(inv.notes)}</p>`:''}<p><b>Signature:</b></p>${can?`<img src="${can.toDataURL('image/png')}" style="max-width:100%;border:1px solid #ccc">`:''}`}
function allInvoices(){allInv.innerHTML=db.invoices.map(i=>`<div class="invoiceCard ${i.status}" onclick="loadInv('${i.id}')">${esc(i.date)} • ${esc(i.client)} • ${cash(i.total)} • ${i.status}</div>`).join('')||'<p>No invoices yet.</p>'}
function exportCSV(){download('planner_backup.json',JSON.stringify(db,null,2))}function download(n,t){let b=new Blob([t],{type:'text/plain'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=n;a.click();URL.revokeObjectURL(u)}
function setupSig(){can=sig;if(!can)return;let r=can.getBoundingClientRect();can.width=Math.max(300,Math.floor(r.width*2));can.height=260;ctx=can.getContext('2d');ctx.lineWidth=4;ctx.lineCap='round';ctx.strokeStyle='#111';can.onpointerdown=e=>{draw=true;let p=pt(e);ctx.beginPath();ctx.moveTo(p.x,p.y)};can.onpointermove=e=>{if(!draw)return;let p=pt(e);ctx.lineTo(p.x,p.y);ctx.stroke()};can.onpointerup=()=>{draw=false;preview()};can.onpointerleave=()=>draw=false}function pt(e){let r=can.getBoundingClientRect();return{x:(e.clientX-r.left)*(can.width/r.width),y:(e.clientY-r.top)*(can.height/r.height)}}function clearSig(up=true){if(!ctx)setupSig();if(ctx){ctx.clearRect(0,0,can.width,can.height);if(up)preview()}}
if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}))}
render();
</script>
</body></html>
