<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Work Planner Dashboard Fixed</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#050505">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Work Planner">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{--bg:#050505;--panel:#101010;--cell:#060606;--line:#252525;--text:#f4f4f4;--muted:#9b9b9b;--green:#00d084;--blue:#00a6ff;--purple:#8b5cf6;--red:#ef4444;--paper:#fbf0d8;--ink:#332719}
*{box-sizing:border-box}html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif;overflow:hidden}.app{height:100vh;max-width:1400px;margin:auto;padding:8px;display:grid;grid-template-rows:auto auto 1fr 190px;gap:8px}.top{display:flex;justify-content:space-between;align-items:center;gap:8px;min-height:42px}h1{font-size:30px;font-weight:400;margin:0}.buttons,.views{display:flex;gap:7px;flex-wrap:wrap}button{border:0;border-radius:9px;padding:9px 11px;background:#2b2b2b;color:#fff;font-weight:bold;font-size:14px}.active{background:var(--green);color:#001b10}.blue{background:var(--blue)}.danger{background:var(--red)}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:8px}.stat{background:#111;border:1px solid var(--line);border-radius:11px;padding:6px 8px}.stat .label{font-size:10px;color:var(--muted)}.stat .val{font-size:17px;color:var(--green);font-weight:bold}.main{min-height:0;display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:8px}.calendar{min-height:0;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#111}.days,.month{display:grid;grid-template-columns:repeat(7,1fr)}.dayname{padding:7px;color:var(--muted);border-bottom:1px solid var(--line);font-weight:bold;font-size:12px}.month{height:calc(100% - 31px)}.day{min-height:0;border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:#050505;padding:4px;overflow:hidden;cursor:pointer}.day:nth-child(7n){border-right:0}.num{font-size:11px;color:var(--muted)}.outside{opacity:.45}.selected{background:#2c2c2c}.today{outline:2px solid var(--blue);outline-offset:-2px}.event{font-size:11px;border-radius:4px;padding:2px 4px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:var(--blue)}.event.done{background:var(--green);color:#001b10}.event.unpaid{background:var(--purple)}.week,.daily{height:100%;display:grid;gap:7px;padding:8px}.week{grid-template-columns:repeat(7,1fr)}.weekbox,.daybox{background:#080808;border:1px solid var(--line);border-radius:12px;padding:9px;overflow:auto}.weekbox b{color:var(--green)}.side{min-height:0;background:var(--paper);color:var(--ink);border:2px solid #d4bc91;border-radius:22px;padding:10px;display:grid;grid-template-rows:auto auto 88px 1fr auto;gap:6px;box-shadow:inset 0 0 0 2px rgba(255,255,255,.35)}.side h2{text-align:center;font-size:32px;letter-spacing:4px;font-family:Georgia,serif;font-weight:400;margin:0;color:#7d5c36}.sideDate{text-align:center;font-weight:bold;font-size:12px;color:#7a5b37}.sideList{border-top:1px solid #d5be92;border-bottom:1px solid #d5be92;overflow:auto;padding:4px}.sideItem{padding:5px 2px;border-bottom:1px solid #dccaa3;cursor:pointer}.sideItem strong{display:block;font-size:13px}.sideItem span{font-size:11px;color:#705536}.formScroll{min-height:0;overflow:auto;padding-right:3px}label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#777;margin:5px 0 2px}input,select,textarea{width:100%;border:1px solid #444;background:#1f1f1f;color:#fff;border-radius:7px;padding:6px;font-size:13px}textarea{min-height:42px;resize:vertical}.side input,.side select,.side textarea{background:#fffaf0;color:#2e2117;border-color:#c7ad7e}.r2{display:grid;grid-template-columns:1fr 1fr;gap:5px}.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}.payProject{display:none}.actions{display:flex;gap:6px;flex-wrap:wrap}.actions button{padding:8px 10px}.chartPanel{min-height:0;background:#050505;border:1px solid var(--line);border-radius:12px;padding:5px;overflow:auto;display:grid;grid-template-rows:auto auto 1fr;-webkit-overflow-scrolling:touch;touch-action:pan-x pan-y}.chartTitle{display:flex;justify-content:space-between;align-items:center;gap:7px;flex-wrap:wrap}.chartTitle h2{margin:0;font-size:18px}.chartHead,.chartRow{display:grid;grid-template-columns:88px 78px 72px 72px 48px 62px 48px 78px 76px 150px 150px 1fr 115px 90px;gap:3px;min-width:1320px}.chartHead{color:#aaa;font-size:10px;text-transform:uppercase;padding:3px;overflow:hidden}.chartRows{overflow:auto;-webkit-overflow-scrolling:touch;touch-action:pan-x pan-y;min-height:0}.chartRow{background:#262626;border-radius:5px;margin:3px 0;padding:3px;align-items:center}.chartRow input,.chartRow textarea,.chartRow select{font-size:12px;padding:5px;border-radius:5px}.chartRow textarea{min-height:28px}.small{font-size:11px;color:#999}.side .small{color:#72583a}
.clientMatches{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}.clientMatches button{font-size:11px;padding:5px 7px;background:#d8c296;color:#2e2117;border:1px solid #b99b62}.clientTotals{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:6px}.clientTotals div{background:#ead8b4;border:1px solid #c5a76f;border-radius:8px;padding:5px;text-align:center}.clientTotals span{display:block;font-size:9px;text-transform:uppercase;color:#775b36}.clientTotals b{font-size:12px;color:#2e2117}
@media(max-width:900px){html,body{overflow:auto}.app{height:auto;min-height:100vh;grid-template-rows:auto auto auto auto}.main{grid-template-columns:1fr}.calendar{height:520px}.side{height:720px}.stats{grid-template-columns:repeat(3,1fr)}.week{grid-template-columns:1fr}.chartPanel{height:300px;overflow:auto}h1{font-size:26px}}
</style>
</head>
<body>
<div class="app">
<div class="top"><h1 id="title"></h1><div class="buttons"><button onclick="prev()">‹</button><button onclick="today()">Today</button><button onclick="next()">›</button><button class="blue" onclick="newJob()">+ Job</button></div></div>
<div class="views"><span class="small" style="align-self:center;color:#00d084;font-weight:bold;">Offline HTML Widget</span><button id="mb" onclick="setView('month')">Monthly</button><button id="wb" onclick="setView('week')">Weekly</button><button id="db" onclick="setView('day')">Daily</button><button onclick="exportCSV()">Export CSV</button></div>
<div class="stats"><div class="stat"><div class="label">Total Hours Worked</div><div class="val" id="sWorked">0</div></div><div class="stat"><div class="label">Total Amount Paid</div><div class="val" id="sPaid">$0</div></div><div class="stat"><div class="label">Total Amount Owed</div><div class="val" id="sOwed">$0</div></div></div>
<div class="main">
<div id="cal" class="calendar"></div>
<aside class="side"><h2>DAY</h2><div id="sideDate" class="sideDate"></div><div id="sideList" class="sideList"></div>
<div class="formScroll">
<input type="hidden" id="id"><label>Date</label><input id="date" type="date"><label>Scheduled Work / Description</label><input id="desc" placeholder="Ex: Dig fence holes">
<div class="r2"><div><label>Person</label><select id="person"></select></div><div><label>Add Person</label><button onclick="addPerson()">Add</button></div></div>
<div class="r2"><div><label>Pay Type</label><select id="payType" onchange="togglePayType();autoCalc()"><option value="hourly">Hourly</option><option value="project">Per Project</option></select></div><div><label>Status</label><select id="status"><option value="scheduled">Scheduled</option><option value="completed">Completed</option></select></div></div>
<div class="r3"><div><label>In</label><input id="inTime" type="time" oninput="autoCalc()"></div><div><label>Out</label><input id="outTime" type="time" oninput="autoCalc()"></div><div><label>Hours</label><input id="hours" type="number" step="0.25" oninput="autoCalc(false)"></div></div>
<div class="r2 hourlyFields"><div><label>Pay / Hour</label><input id="rate" type="number" step="0.01" value="20" oninput="autoCalc()"></div><div><label>Money Owed</label><input id="owed" type="number" step="0.01"></div></div>
<div class="payProject"><label>Project Price / Money Owed</label><input id="projectPrice" type="number" step="0.01" oninput="owed.value=this.value"></div>
<label>Materials / Tools Needed</label><textarea id="materialsNeeded" placeholder="What you think you'll need"></textarea>
<label>Materials / Tools Actually Used</label><textarea id="materialsUsed" placeholder="What you actually used on the job"></textarea>
<div class="r3"><div><label>Paid?</label><select id="paid" onchange="if(this.value==='yes'&&!g('received').value)g('received').value=g('owed').value; renderStats(); renderClientTotals();"><option value="no">No</option><option value="yes">Yes</option></select></div><div><label>How Paid</label><select id="howPaid"><option></option><option>Cash</option><option>Check</option><option>Cash App</option><option>PayPal</option><option>Venmo</option><option>Transfer</option><option>Other</option></select></div><div><label>Received</label><input id="received" type="number" step="0.01"></div></div>
<label>Client Name</label>
<input id="client" list="clientNames" oninput="showClientMatches()" onchange="maybeFillClient()">
<datalist id="clientNames"></datalist>
<div id="clientMatches" class="clientMatches"></div>
<label>Client Address</label><input id="address">
<label>Client Phone</label><input id="phone">

<div class="clientTotals">
  <div><span>Client Hours</span><b id="clientHours">0</b></div>
  <div><span>Client Paid</span><b id="clientPaid">$0</b></div>
  <div><span>Client Owed</span><b id="clientOwed">$0</b></div>
</div>

<label>Notes</label><textarea id="notes"></textarea>
</div><div class="actions"><button class="active" onclick="saveJob()">Save</button><button onclick="clearForm(selected)">Clear</button><button class="danger" onclick="deleteJob()">Delete</button><span id="saveMsg" class="small"></span></div></aside>
</div>
<div class="chartPanel"><div class="chartTitle"><h2>Completed / Job Info Chart</h2><input id="search" placeholder="Search..." oninput="renderChart()" style="max-width:220px"></div>
<div class="chartHead"><div>Date</div><div>Status</div><div>In</div><div>Out</div><div>Hrs</div><div>Owed</div><div>Paid</div><div>How Paid</div><div>Received</div><div>Needed</div><div>Used</div><div>Work</div><div>Client</div><div>Phone</div></div><div id="chartRows" class="chartRows"></div></div>
</div>
<script>
const STORAGE='work_planner_final_clean_v1';
let state=JSON.parse(localStorage.getItem(STORAGE)||'null')||{
 view:'month',current:'2026-05-01T12:00:00',selected:iso(new Date()),people:['Me'],
 jobs:[]};
let view=state.view,current=new Date(state.current),selected=state.selected,people=state.people,jobs=state.jobs;
function uid(){return (crypto&&crypto.randomUUID)?crypto.randomUUID():'id'+Date.now()+Math.random()}
function g(id){return document.getElementById(id)}
function iso(d){let x=new Date(d);x.setMinutes(x.getMinutes()-x.getTimezoneOffset());return x.toISOString().slice(0,10)}
function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function money(n){return '$'+Number(n||0).toFixed(2)}
function persist(){localStorage.setItem(STORAGE,JSON.stringify({view,current:current.toISOString(),selected,people,jobs}))}
function calcHours(a,b){if(!a||!b)return'';let [ah,am]=a.split(':').map(Number),[bh,bm]=b.split(':').map(Number);let mins=(bh*60+bm)-(ah*60+am);if(mins<0)mins+=1440;return (mins/60).toFixed(mins%60===0?0:2)}
function cleanJob(j){return {id:j.id||uid(),date:j.date||selected,desc:j.desc||'',person:j.person||'Me',payType:j.payType||'hourly',status:j.status||'scheduled',inTime:j.inTime||'',outTime:j.outTime||'',hours:String(j.hours??''),rate:String(j.rate??20),owed:String(j.owed??''),projectPrice:String(j.projectPrice??''),materialsNeeded:j.materialsNeeded||'',materialsUsed:j.materialsUsed||'',paid:j.paid||'no',howPaid:j.howPaid||'',received:String(j.received??''),client:j.client||'',address:j.address||'',phone:j.phone||'',notes:j.notes||''}}
jobs=jobs.map(cleanJob);
function setView(v){view=v;persist();renderAll()}function today(){current=new Date();selected=iso(new Date());persist();renderAll()}
function prev(){if(view==='month')current.setMonth(current.getMonth()-1);if(view==='week')current.setDate(current.getDate()-7);if(view==='day')current.setDate(current.getDate()-1);persist();renderAll()}
function next(){if(view==='month')current.setMonth(current.getMonth()+1);if(view==='week')current.setDate(current.getDate()+7);if(view==='day')current.setDate(current.getDate()+1);persist();renderAll()}
function weekStart(d){let x=new Date(d);x.setDate(x.getDate()-x.getDay());x.setHours(12,0,0,0);return x}
function jobsOn(d){return jobs.filter(j=>j.date===d)}
function titleText(){if(view==='month')return current.toLocaleDateString(undefined,{month:'long',year:'numeric'});if(view==='week')return 'Week of '+weekStart(current).toLocaleDateString();return current.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric',year:'numeric'})}
function eventText(j){return j.status==='completed'?`${j.desc||'Work'} ${j.hours||0}h ${money(j.owed)}`:`${j.desc||'Work'} ${j.inTime||''}`}
function renderCal(){const names=['SUN','MON','TUE','WED','THU','FRI','SAT'];if(view==='month'){let y=current.getFullYear(),m=current.getMonth(),start=new Date(y,m,1,12);start.setDate(1-start.getDay());let html='<div class="days">'+names.map(n=>`<div class="dayname">${n}</div>`).join('')+'</div><div class="month">';for(let i=0;i<42;i++){let d=new Date(start);d.setDate(start.getDate()+i);let day=iso(d),arr=jobsOn(day),cls=['day',d.getMonth()!==m?'outside':'',day===selected?'selected':'',day===iso(new Date())?'today':''].join(' ');html+=`<div class="${cls}" onclick="selectDay('${day}')"><div class="num">${d.getDate()}</div>${arr.slice(0,3).map(j=>`<div class="event ${j.status==='completed'?'done':'unpaid'}" onclick="event.stopPropagation();loadJob('${j.id}')">${esc(eventText(j))}</div>`).join('')}</div>`}cal.innerHTML=html+'</div>'}else if(view==='week'){let st=weekStart(current),html='<div class="week">';for(let i=0;i<7;i++){let d=new Date(st);d.setDate(st.getDate()+i);let day=iso(d);html+=`<div class="weekbox" onclick="selectDay('${day}')"><b>${names[i]} ${d.getMonth()+1}/${d.getDate()}</b>${jobsOn(day).map(j=>`<div class="event ${j.status==='completed'?'done':'unpaid'}" onclick="event.stopPropagation();loadJob('${j.id}')">${esc(eventText(j))}</div>`).join('')||'<p class="small">No work</p>'}</div>`}cal.innerHTML=html+'</div>'}else{let day=iso(current);selected=day;cal.innerHTML=`<div class="daily"><div class="daybox" onclick="selectDay('${day}')"><h2>${current.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})}</h2>${jobsOn(day).map(j=>`<div class="event ${j.status==='completed'?'done':'unpaid'}" onclick="event.stopPropagation();loadJob('${j.id}')">${esc(eventText(j))}</div>`).join('')||'<p class="small">No work yet. Hit + Job.</p>'}</div></div>`}}
function renderSide(){let d=new Date(selected+'T12:00:00');sideDate.textContent=d.toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric',year:'numeric'});let arr=jobsOn(selected);sideList.innerHTML=arr.length?arr.map(j=>`<div class="sideItem" onclick="loadJob('${j.id}')"><strong>${esc(j.desc||'Work')}</strong><span>${j.status} • ${j.inTime||'--'} • ${j.hours||0} hrs • ${money(j.owed)}</span></div>`).join(''):'<div class="small">No jobs for this day yet.</div>'}
function renderPeople(){person.innerHTML=people.map(p=>`<option>${esc(p)}</option>`).join('')}
function renderChart(){let q=(search.value||'').toLowerCase();let visible=jobs.slice().sort((a,b)=>(a.date||'').localeCompare(b.date||'')).filter(j=>Object.values(j).join(' ').toLowerCase().includes(q));chartRows.innerHTML=visible.map(j=>`<div class="chartRow">
<input type="date" value="${esc(j.date)}" onchange="quick('${j.id}','date',this.value)">
<select onchange="quick('${j.id}','status',this.value)"><option value="scheduled" ${j.status==='scheduled'?'selected':''}>Scheduled</option><option value="completed" ${j.status==='completed'?'selected':''}>Completed</option></select>
<input type="time" value="${esc(j.inTime)}" onchange="quick('${j.id}','inTime',this.value,true)">
<input type="time" value="${esc(j.outTime)}" onchange="quick('${j.id}','outTime',this.value,true)">
<input value="${esc(j.hours)}" onchange="quick('${j.id}','hours',this.value,true)">
<input value="${esc(j.owed)}" onchange="quick('${j.id}','owed',this.value)">
<select onchange="quick('${j.id}','paid',this.value)"><option value="no" ${j.paid!=='yes'?'selected':''}>No</option><option value="yes" ${j.paid==='yes'?'selected':''}>Yes</option></select>
<input value="${esc(j.howPaid)}" onchange="quick('${j.id}','howPaid',this.value)">
<input value="${esc(j.received)}" onchange="quick('${j.id}','received',this.value)">
<textarea onchange="quick('${j.id}','materialsNeeded',this.value)">${esc(j.materialsNeeded)}</textarea>
<textarea onchange="quick('${j.id}','materialsUsed',this.value)">${esc(j.materialsUsed)}</textarea>
<textarea onchange="quick('${j.id}','desc',this.value)">${esc(j.desc)}</textarea>
<input value="${esc(j.client)}" onchange="quick('${j.id}','client',this.value)">
<input value="${esc(j.phone)}" onchange="quick('${j.id}','phone',this.value)">
</div>`).join('')}
function renderStats(){
 let worked=0, paidTotal=0, owedRemaining=0;

 jobs.forEach(j=>{
   const hrs = Number(j.hours || 0);
   const owed = Number(j.owed || 0);
   let received = Number(j.received || 0);
   const isPaid = String(j.paid || '').toLowerCase() === 'yes';
   const isCompleted = String(j.status || '').toLowerCase() === 'completed';
   const hasOutTime = !!j.outTime;

   // Count work if it has hours and was completed, paid, has money received, or has an out time.
   const countsAsWorked = hrs > 0 && (isCompleted || isPaid || received > 0 || hasOutTime);

   if(countsAsWorked){
     worked += hrs;
   }

   // If marked paid but received is blank, assume received equals owed.
   if(isPaid && received === 0 && owed > 0){
     received = owed;
   }

   paidTotal += received;

   // Owed means still unpaid / remaining amount.
   owedRemaining += Math.max(owed - received, 0);
 });

 g('sWorked').textContent = worked.toFixed(2);
 g('sPaid').textContent = money(paidTotal);
 g('sOwed').textContent = money(owedRemaining);
}
function renderAll(){title.textContent=titleText();mb.className=view==='month'?'active':'';wb.className=view==='week'?'active':'';db.className=view==='day'?'active':'';renderPeople();renderClientOptions();renderCal();renderSide();renderChart();renderStats();renderClientTotals();if(!g('date').value)clearForm(selected)}
function selectDay(d){selected=d;let first=jobsOn(d)[0];first?fill(first):clearForm(d);persist();renderAll()}
function togglePayType(){
 const payTypeVal=g('payType').value;
 document.querySelector('.payProject').style.display=payTypeVal==='project'?'block':'none';
 document.querySelector('.hourlyFields').style.display=payTypeVal==='hourly'?'grid':'none';
}
function autoCalc(fromTime=true){
 const inV=g('inTime').value, outV=g('outTime').value;
 if(fromTime){
   const h=calcHours(inV,outV);
   if(h) g('hours').value=h;
 }
 if(g('payType').value==='hourly'){
   g('owed').value=(Number(g('hours').value||0)*Number(g('rate').value||0)).toFixed(2);
 }else{
   g('owed').value=g('projectPrice').value || g('owed').value;
 }
 if(g('paid').value==='yes' && !g('received').value) g('received').value=g('owed').value;
}
function formJob(){
 autoCalc(false);
 return cleanJob({
   id:g('id').value||uid(),
   date:g('date').value||selected,
   desc:g('desc').value,
   person:g('person').value,
   payType:g('payType').value,
   status:g('status').value,
   inTime:g('inTime').value,
   outTime:g('outTime').value,
   hours:g('hours').value,
   rate:g('rate').value,
   owed:g('owed').value,
   projectPrice:g('projectPrice').value,
   materialsNeeded:g('materialsNeeded').value,
   materialsUsed:g('materialsUsed').value,
   paid:g('paid').value,
   howPaid:g('howPaid').value,
   received:g('received').value,
   client:g('client').value,
   address:g('address').value,
   phone:g('phone').value,
   notes:g('notes').value
 });
}
function fill(j){
 j=cleanJob(j);
 selected=j.date;
 g('id').value=j.id;
 g('date').value=j.date;
 g('desc').value=j.desc;
 g('person').value=j.person;
 g('payType').value=j.payType;
 g('status').value=j.status;
 g('inTime').value=j.inTime;
 g('outTime').value=j.outTime;
 g('hours').value=j.hours;
 g('rate').value=j.rate;
 g('owed').value=j.owed;
 g('projectPrice').value=j.projectPrice;
 g('materialsNeeded').value=j.materialsNeeded;
 g('materialsUsed').value=j.materialsUsed;
 g('paid').value=j.paid;
 g('howPaid').value=j.howPaid;
 g('received').value=j.received;
 g('client').value=j.client;
 g('address').value=j.address;
 g('phone').value=j.phone;
 g('notes').value=j.notes;
 togglePayType();
 renderClientTotals();
}
function clearForm(d=selected){
 g('id').value='';
 g('date').value=d;
 g('desc').value='';
 g('person').value=people[0]||'Me';
 g('payType').value='hourly';
 g('status').value='scheduled';
 g('inTime').value='';
 g('outTime').value='';
 g('hours').value='';
 g('rate').value=g('rate').value||20;
 g('owed').value='';
 g('projectPrice').value='';
 g('materialsNeeded').value='';
 g('materialsUsed').value='';
 g('paid').value='no';
 g('howPaid').value='';
 g('received').value='';
 g('client').value='';
 g('address').value='';
 g('phone').value='';
 g('notes').value='';
 togglePayType();
 renderClientTotals();
}
function newJob(){clearForm(selected);desc.focus()}
function saveJob(){
 const j=formJob();
 const idx=jobs.findIndex(x=>x.id===j.id);
 if(idx>=0) jobs[idx]=j; else jobs.push(j);
 selected=j.date;
 persist();
 fill(j);
 const msg=g('saveMsg'); if(msg){msg.textContent='Saved'; setTimeout(()=>msg.textContent='',1200);}
 renderAll();
}
function deleteJob(){
 const currentId=g('id').value;
 if(!currentId) return clearForm(selected);
 jobs=jobs.filter(j=>j.id!==currentId);
 clearForm(selected);
 persist();
 renderStats();
 renderAll();
}
function loadJob(jobId){
 const j=jobs.find(x=>x.id===jobId);
 if(j){
   selected=j.date;
   fill(j);
   persist();
   renderAll();
 }
}
function quick(jobId,field,value,recalc=false){
 const j=jobs.find(x=>x.id===jobId);
 if(!j) return;
 j[field]=value;
 if(recalc){
   if(field==='inTime'||field==='outTime') j.hours=calcHours(j.inTime,j.outTime);
   if(j.payType==='hourly') j.owed=(Number(j.hours||0)*Number(j.rate||0)).toFixed(2);
 }
 if(field==='paid' && value==='yes' && !j.received) j.received=j.owed;
 persist();
 renderStats();
 renderAll();
}
function addPerson(){let n=prompt('Person name?');if(n&&!people.includes(n.trim()))people.push(n.trim());persist();renderAll()}

function clientMap(){
 let map={};
 jobs.forEach(j=>{
   const name=(j.client||'').trim();
   if(!name)return;
   if(!map[name]) map[name]={name, address:j.address||'', phone:j.phone||'', hours:0, paid:0, owed:0};
   if(j.address) map[name].address=j.address;
   if(j.phone) map[name].phone=j.phone;
   map[name].hours += Number(j.hours||0);
   map[name].paid += Number(j.received||0);
   map[name].owed += Math.max(Number(j.owed||0)-Number(j.received||0),0);
 });
 return map;
}
function renderClientOptions(){
 const map=clientMap();
 const list=document.getElementById('clientNames');
 if(!list)return;
 list.innerHTML=Object.keys(map).sort().map(n=>`<option value="${esc(n)}"></option>`).join('');
}
function showClientMatches(){
 const q=(client.value||'').trim().toLowerCase();
 const box=document.getElementById('clientMatches');
 if(!box)return;
 if(!q){box.innerHTML='';renderClientTotals();return;}
 const map=clientMap();
 const matches=Object.values(map).filter(c=>c.name.toLowerCase().startsWith(q)).slice(0,5);
 box.innerHTML=matches.map(c=>`<button type="button" onclick="fillClient('${esc(c.name).replaceAll("'","&#039;")}')">${esc(c.name)}</button>`).join('');
 renderClientTotals();
}
function maybeFillClient(){
 const name=(client.value||'').trim();
 const map=clientMap();
 if(map[name]) fillClient(name);
 else renderClientTotals();
}
function fillClient(name){
 const map=clientMap();
 const c=map[name];
 if(!c)return;
 client.value=c.name;
 address.value=c.address||'';
 phone.value=c.phone||'';
 const box=document.getElementById('clientMatches');
 if(box)box.innerHTML='';
 renderClientTotals();
}
function renderClientTotals(){
 const name=(client.value||'').trim();
 const map=clientMap();
 const c=map[name];
 const ch=document.getElementById('clientHours'), cp=document.getElementById('clientPaid'), co=document.getElementById('clientOwed');
 if(!ch||!cp||!co)return;
 if(c){
   ch.textContent=c.hours.toFixed(2);
   cp.textContent=money(c.paid);
   co.textContent=money(c.owed);
 }else{
   ch.textContent='0';
   cp.textContent=money(0);
   co.textContent=money(0);
 }
}

function exportCSV(){let h=['Date','Description','Person','Pay Type','Status','In','Out','Hours','Rate','Owed','Materials Needed','Materials Used','Paid','How Paid','Received','Client','Address','Phone','Notes'];let k=['date','desc','person','payType','status','inTime','outTime','hours','rate','owed','materialsNeeded','materialsUsed','paid','howPaid','received','client','address','phone','notes'];let csv=[h.join(',')].concat(jobs.map(j=>k.map(x=>`"${String(j[x]??'').replaceAll('"','""')}"`).join(','))).join('\n');let blob=new Blob([csv],{type:'text/csv'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='work-planner-dashboard.csv';a.click();URL.revokeObjectURL(url)}
renderAll();
document.addEventListener('input',function(e){
 if(['hours','owed','received','client','address','phone'].includes(e.target.id)){
   renderStats();
   renderClientTotals();
 }
});
document.addEventListener('change',function(e){
 if(['hours','owed','received','client','address','phone'].includes(e.target.id)){
   renderStats();
   renderClientTotals();
 }
});
